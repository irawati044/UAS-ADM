version: '3.8'

services:
  web:
    image: irawatiiskandar/uas_statis:latest
    container_name: novellib-web
    restart: always
    ports:
      - "3000:80"
    environment:
      - DB_HOST=db
      - DB_NAME=esport_db
      - DB_USER=root
      - DB_PASS=rootpassword
    volumes:
      - uploads_data:/var/www/html/uploads
    depends_on:
      - db

  web-statis:
    image: nginx:alpine
    container_name: novellib-statis
    restart: always
    ports:
      - "3002:80"
    volumes:
      - ./web-statis:/usr/share/nginx/html:ro
      - ./web-statis/default.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    image: mariadb:10.11
    container_name: novellib-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: esport_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./web-dinamis/database.sql:/docker-entrypoint-initdb.d/init.sql:ro

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: novellib-pma
    restart: always
    ports:
      - "3001:80"
    environment:
      - PMA_HOST=db
    depends_on:
      - db

volumes:
  db_data:
  uploads_data:

