name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      # MENYIAPKAN PRIVATE KEY LANGSUNG SEBAGAI FILE .PEM TEMPORER
      - name: Setup SSH Key File
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # RE-TRY SINKRONISASI FILE DENGAN MENUNJUK LANGSUNG FILE KEY-NYA
      - name: Sync repository to EC2
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" --exclude '.git' --exclude '.github' --exclude 'node_modules' ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/UAS-ADM

      # REMOTE DEPLOY UTAMA
      - name: Run remote deploy commands on EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} -p 22 << 'EOF'
          set -e
          cd /home/ubuntu/UAS-ADM
          if [ -f docker-compose.yml ]; then
            docker compose pull || true
            docker compose up -d --build
          fi
          EOF