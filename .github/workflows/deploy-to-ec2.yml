name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    # Menghubungkan variabel ENV ke Secret yang benar dari foto Anda
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }} # Asumsi ini sudah ada
      SSH_USER: ${{ secrets.EC2_USER }}      # Dari EC2_USER di foto
      SSH_HOST: ${{ secrets.EC2_HOST }}      # Dari EC2_HOST di foto
      SSH_PORT: ${{ secrets.SSH_PORT }}      # Asumsi ini sudah ada

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- BAGIAN INI YANG KITA PERBAIKI ---
      - name: Start ssh-agent and add private key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          # Kita ganti dari SSH_PRIVATE_KEY menjadi PRIVATE_KEY sesuai foto
          ssh-private-key: ${{ secrets.PRIVATE_KEY }} 
      # -------------------------------------

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Sync repository to EC2
        run: |
          rsync -avz --delete --exclude '.git' --exclude '.github' --exclude 'node_modules' ./ $SSH_USER@$SSH_HOST:$DEPLOY_PATH
        env:
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}

      - name: Run remote deploy commands on EC2
        run: |
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST -p ${SSH_PORT:-22} << 'EOF'
          set -e
          cd ${DEPLOY_PATH}
          # Optional: pull latest images and start services
          if [ -f docker-compose.yml ]; then
            docker-compose pull || true
            docker-compose up -d --build
          fi
          EOF